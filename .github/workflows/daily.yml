name: Daily NEPSE Floorsheet Download

on:
  schedule:
    - cron: '30 9 * * 0-4'
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install NepseUnofficialApi
        run: pip install git+https://github.com/basic-bgnr/NepseUnofficialApi

      - name: Fix SSL certificate for NEPSE
        run: |
          sudo curl -A "Mozilla Chrome Safari" "https://www.ssllabs.com/ssltest/getTestCertificate?d=nepalstock.com.np&cid=3a83c9a7e960f29b48e5719510e2e8582c37f72f3abf35e6f400eaacec38aad2&time=1695547628855" >> geotrust.pem
          sudo curl -A "Mozilla Chrome Safari" "https://www.ssllabs.com/ssltest/getTestChain?d=nepalstock.com.np&cid=3a83c9a7e960f29b48e5719510e2e8582c37f72f3abf35e6f400eaacec38aad2&time=1695547628855" >> geotrust_alt.pem
          sudo cp geotrust.pem /usr/local/share/ca-certificates/geotrust.crt
          sudo cp geotrust_alt.pem /usr/local/share/ca-certificates/geotrust_alt.crt
          sudo update-ca-certificates

      - name: Download floorsheet
        run: |
          mkdir -p data
          nepse-cli --get-floorsheet --to-csv --output-file data/floorsheet_tmp.csv

      - name: Read business date from CSV and rename file
        id: bizdate
        run: |
          DATE=$(python3 - <<'PY'
          import csv
          with open("data/floorsheet_tmp.csv", encoding="utf-8-sig") as f:
              reader = csv.DictReader(f)
              first = next(reader, None)
              print((first or {}).get("businessDate", "").strip()[:10])
          PY
          )
          echo "DATE=$DATE" >> $GITHUB_OUTPUT
          mv data/floorsheet_tmp.csv data/floorsheet_$DATE.csv

      - name: Send email with floorsheet
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_PASS }}
          subject: "NEPSE Floorsheet ${{ steps.bizdate.outputs.DATE }}"
          body: "Please find attached the NEPSE floorsheet for ${{ steps.bizdate.outputs.DATE }}."
          to: dilipkaphle@gmail.com
          from: ${{ secrets.GMAIL_USER }}
          attachments: data/floorsheet_${{ steps.bizdate.outputs.DATE }}.csv

      - name: Delete floorsheet after email
        run: rm -f data/floorsheet_${{ steps.bizdate.outputs.DATE }}.csv
